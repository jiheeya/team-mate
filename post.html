<!DOCTYPE html>
<html lang="ko">

<head>
  <title>Team Mate - 팀원 구하기</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      background-color: #FFFBF5;
      color: #1a1a1a;
    }

    /* ── 상단 네비게이션 ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background-color: #FFFBF5;
      border-bottom: 1px solid #FFE0C8;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #FF6B35;
      text-decoration: none;
    }

    .nav-btn {
      background-color: #FF6B35;
      color: white;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    /* ── 본문 영역 ── */
    .container {
      max-width: 640px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .page-title span {
      color: #FF6B35;
    }

    .page-subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 40px;
    }

    /* ── 폼 카드 ── */
    .form-card {
      background-color: #ffffff;
      border-radius: 20px;
      padding: 40px;
      border: 1.5px solid #FFE0C8;
    }

    .form-group {
      margin-bottom: 28px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .form-group .hint {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
      font-weight: 400;
    }

    .required {
      color: #FF6B35;
      margin-left: 2px;
    }

    .form-group input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #eee;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background-color: #FFFBF5;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input[type="text"]:focus {
      border-color: #FF6B35;
    }

    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #eee;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background-color: #FFFBF5;
      resize: vertical;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group textarea:focus {
      border-color: #FF6B35;
    }

    /* ── 태그 버튼 ── */
    .tag-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* 기본 태그 버튼 */
    .tag-btn {
      padding: 8px 18px;
      border-radius: 50px;
      border: 1.5px solid #eee;
      background-color: #FFFBF5;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #888;
      font-family: inherit;
      transition: all 0.15s;
    }

    /* 선택됐을 때 — 오렌지 배경 + 흰 글씨 */
    .tag-btn.active {
      background-color: #FF6B35;
      border-color: #FF6B35;
      color: white;
      transform: scale(1.05); /* 살짝 커지는 효과 */
    }

    /* 직접 추가 입력칸 */
    .add-tag-group {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .add-tag-input {
      flex: 1;
      padding: 8px 14px;
      border: 1.5px solid #eee;
      border-radius: 50px;
      font-size: 13px;
      outline: none;
      background-color: #FFFBF5;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .add-tag-input:focus {
      border-color: #FF6B35;
    }

    .add-tag-btn {
      padding: 8px 16px;
      background-color: #FFD23F;
      border: none;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: #7A4F00;
      font-family: inherit;
    }

    /* ── 등록하기 버튼 ── */
    .submit-btn {
      width: 100%;
      padding: 18px;
      background-color: #FF6B35;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
      font-family: inherit;
    }

    .submit-btn:hover {
      background-color: #e85c28;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 32px 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .section-desc {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">🔥 Team Mate</a>
    <a href="list.html" class="nav-btn">팀원 찾아보기</a>
  </nav>

  <div class="container">
    <h1 class="page-title">팀원을 <span>구해요</span></h1>
    <p class="page-subtitle">함께할 메이트를 찾고 있다면 아래 내용을 작성해주세요</p>

    <div class="form-card">

      <!-- ① 닉네임 -->
      <div class="form-group">
        <label>닉네임 <span class="required">*</span></label>
        <p class="hint">Team Mate에서 사용할 이름을 입력해주세요</p>
        <input type="text" id="nickname" placeholder="예) 불꽃기획자" />
      </div>

      <!-- ② 프로젝트 이름 -->
      <div class="form-group">
        <label>프로젝트 이름 <span class="required">*</span></label>
        <input type="text" id="projectName" placeholder="예) 캠퍼스 중고거래 앱" />
      </div>

      <!-- ③ 모집 역할 -->
      <div class="form-group">
        <label>모집 역할 <span class="required">*</span></label>
        <p class="hint">함께할 팀원의 역할을 선택해주세요 (복수 선택 가능)</p>
        <div class="tag-group" id="roleGroup">
          <button class="tag-btn" onclick="toggleTag(this)">개발자</button>
          <button class="tag-btn" onclick="toggleTag(this)">디자이너</button>
          <button class="tag-btn" onclick="toggleTag(this)">기획자</button>
          <button class="tag-btn" onclick="toggleTag(this)">마케터</button>
        </div>
      </div>

      <!-- ④ 프로젝트 소개 -->
      <div class="form-group">
        <label>프로젝트 소개 <span class="required">*</span></label>
        <p class="hint">어떤 프로젝트인지, 어떤 팀원을 원하는지 자유롭게 적어주세요</p>
        <textarea id="description" rows="5" placeholder="예) 대학생 중고거래 앱을 만들고 싶어요!"></textarea>
      </div>

      <hr class="divider" />

      <!-- ⑤ 나를 표현하는 키워드 -->
      <p class="section-title">나를 표현하는 키워드</p>
      <p class="section-desc">나에게 해당하는 키워드를 선택해주세요 (복수 선택 가능)</p>

      <div class="form-group">
        <div class="tag-group" id="keywordGroup">
          <button class="tag-btn" onclick="toggleTag(this)">책임감 있는</button>
          <button class="tag-btn" onclick="toggleTag(this)">추진력 있는</button>
          <button class="tag-btn" onclick="toggleTag(this)">꼼꼼한</button>
          <button class="tag-btn" onclick="toggleTag(this)">아이디어 넘치는</button>
          <button class="tag-btn" onclick="toggleTag(this)">커뮤니케이션 잘하는</button>
          <button class="tag-btn" onclick="toggleTag(this)">빠른 실행력</button>
          <button class="tag-btn" onclick="toggleTag(this)">야행성</button>
          <button class="tag-btn" onclick="toggleTag(this)">계획적인</button>
          <button class="tag-btn" onclick="toggleTag(this)">유연한</button>
          <button class="tag-btn" onclick="toggleTag(this)">열정 넘치는</button>
        </div>
        <div class="add-tag-group">
          <input type="text" class="add-tag-input" id="keywordInput" placeholder="직접 입력 후 추가" />
          <button class="add-tag-btn" onclick="addTag('keywordGroup', 'keywordInput')">+ 추가</button>
        </div>
      </div>

      <hr class="divider" />

      <!-- ⑥ 원하는 팀 분위기 -->
      <p class="section-title">이런 팀을 만들고 싶어요!</p>
      <p class="section-desc">원하는 팀 분위기 태그를 선택해주세요 (복수 선택 가능)</p>

      <div class="form-group">
        <div class="tag-group" id="vibeGroup">
          <button class="tag-btn" onclick="toggleTag(this)">빠르게 실행하는 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">체계적으로 일하는 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">자유롭게 소통하는 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">목표 지향적인 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">정기적으로 만나는 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">온라인 중심 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">오프라인 중심 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">수평적인 팀</button>
          <button class="tag-btn" onclick="toggleTag(this)">피드백을 잘 주고받는 팀</button>
        </div>
        <div class="add-tag-group">
          <input type="text" class="add-tag-input" id="vibeInput" placeholder="직접 입력 후 추가" />
          <button class="add-tag-btn" onclick="addTag('vibeGroup', 'vibeInput')">+ 추가</button>
        </div>
      </div>

      <hr class="divider" />

      <!-- ⑦ 연락처 -->
      <div class="form-group">
        <label>연락처 <span class="required">*</span></label>
        <p class="hint">관심 있는 메이트가 연락할 수 있도록 알려주세요</p>
        <input type="text" id="contact" placeholder="예) 오픈카톡 링크, 이메일 주소" />
      </div>

      <button class="submit-btn" onclick="submitPost()">등록하기 🚀</button>

    </div>
  </div>

  <!-- 스크립트는 하나만! -->
  <script>
    // Supabase 연결 설정
    const SUPABASE_URL = 'https://mpyagifwfxfwlizyrxtt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weWFnaWZ3Znhmd2xpenlyeHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjY4MDAsImV4cCI6MjA5NDAwMjgwMH0.wgPjZ-IqFLh8QrioxYKfhR_Gnja9qtv0Cxz6thOuyaU';

    // 태그 버튼 클릭하면 선택/해제
    function toggleTag(btn) {
      btn.classList.toggle('active');
    }

    // 직접 입력한 태그 추가
    function addTag(groupId, inputId) {
      const input = document.getElementById(inputId);
      const group = document.getElementById(groupId);
      const text = input.value.trim();

      if (!text) return;

      const btn = document.createElement('button');
      btn.className = 'tag-btn active';
      btn.textContent = text;
      btn.onclick = function () { toggleTag(this); };
      group.appendChild(btn);

      input.value = '';
    }

    // 엔터 키로도 태그 추가 가능
    document.getElementById('keywordInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTag('keywordGroup', 'keywordInput');
    });

    document.getElementById('vibeInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTag('vibeGroup', 'vibeInput');
    });

    // 선택된 태그들을 쉼표로 이어진 텍스트로 변환
    function getSelectedTags(groupId) {
      const group = document.getElementById(groupId);
      const activeBtns = group.querySelectorAll('.tag-btn.active');
      return Array.from(activeBtns).map(btn => btn.textContent).join(', ');
    }

    // 등록하기 버튼 클릭하면 실행
    async function submitPost() {
      const nickname = document.getElementById('nickname').value.trim();
      const projectName = document.getElementById('projectName').value.trim();
      const description = document.getElementById('description').value.trim();
      const contact = document.getElementById('contact').value.trim();
      const roles = getSelectedTags('roleGroup');
      const keywords = getSelectedTags('keywordGroup');
      const vibes = getSelectedTags('vibeGroup');

      // 필수 항목 확인
      if (!nickname || !projectName || !description || !contact || !roles) {
        alert('필수 항목을 모두 입력해주세요!');
        return;
      }

      // Supabase에 저장
      const response = await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({
          nickname,
          project_name: projectName,
          roles,
          description,
          keywords,
          vibes,
          contact
        })
      });

      if (response.ok) {
        alert('등록 완료! 메이트를 찾아봐요 🚀');
        window.location.href = 'list.html';
      } else {
        alert('저장 중 오류가 발생했어요. 다시 시도해주세요.');
      }
    }
  </script>

</body>

</html>
