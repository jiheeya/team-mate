<!DOCTYPE html>
<html lang="ko">

<head>
  <title>Team Mate - 팀원 찾기</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      background-color: #FFFBF5;
      color: #1a1a1a;
    }

    /* ── 상단 네비게이션 ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background-color: #FFFBF5;
      border-bottom: 1px solid #FFE0C8;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #FF6B35;
      text-decoration: none;
    }

    .nav-btn {
      background-color: #FF6B35;
      color: white;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    /* ── 본문 영역 ── */
    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .page-title span {
      color: #FF6B35;
    }

    .page-subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 40px;
    }

    /* ── 카드 목록 그리드 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    /* ── 구인글 카드 하나 ── */
    .card {
      background-color: #ffffff;
      border-radius: 20px;
      padding: 28px;
      border: 1.5px solid #FFE0C8;
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: #FF6B35;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .nickname {
      font-size: 14px;
      font-weight: 700;
      color: #FF6B35;
    }

    .role-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      background-color: #FFD23F;
      color: #7A4F00;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px;
    }

    .project-name {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .description {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tag-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .tag {
      background-color: #FFFBF5;
      border: 1.5px solid #FFE0C8;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 50px;
    }

    .card-footer {
      border-top: 1px solid #f0f0f0;
      padding-top: 16px;
    }

    .contact-btn {
      display: inline-block;
      background-color: #FF6B35;
      color: white;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    /* 데이터 로딩 중일 때 표시 */
    .loading {
      text-align: center;
      padding: 60px;
      color: #aaa;
      font-size: 16px;
    }

    /* 데이터가 없을 때 표시 */
    .empty {
      text-align: center;
      padding: 60px;
      color: #aaa;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">🔥 Team Mate</a>
    <a href="post.html" class="nav-btn">팀원 구하기 →</a>
  </nav>

  <div class="container">
    <h1 class="page-title"><span>메이트</span>를 찾아요</h1>
    <p class="page-subtitle">함께 창업할 팀원을 구하고 있어요. 마음에 드는 팀에 연락해보세요!</p>

    <!-- 카드 목록 — JavaScript가 여기에 카드를 자동으로 채워줌 -->
    <div class="card-grid" id="cardGrid">
      <!-- 처음엔 로딩 메시지 표시 -->
      <div class="loading" style="grid-column: 1 / -1;">불러오는 중... 🔥</div>
    </div>
  </div>

  <script>
    // Supabase 연결 설정
    // post.html에 넣은 것과 똑같은 값 넣어주세요
    const SUPABASE_URL = 'https://mpyagifwfxfwlizyrxtt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weWFnaWZ3Znhmd2xpenlyeHR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjY4MDAsImV4cCI6MjA5NDAwMjgwMH0.wgPjZ-IqFLh8QrioxYKfhR_Gnja9qtv0Cxz6thOuyaU';

    // 페이지가 열리면 자동으로 데이터 불러오기
    window.onload = function () {
      loadPosts();
    };

    // Supabase에서 posts 데이터 불러오는 함수
    async function loadPosts() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/posts?order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      const posts = await response.json();
      const grid = document.getElementById('cardGrid');

      // 데이터가 없을 때
      if (posts.length === 0) {
        grid.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">아직 등록된 구인글이 없어요 😢<br/>첫 번째 메이트가 되어보세요!</div>';
        return;
      }

      // 데이터가 있으면 카드로 만들어서 화면에 표시
      grid.innerHTML = posts.map(post => createCard(post)).join('');
    }

    // 카드 HTML 만드는 함수
    function createCard(post) {
      // 역할을 쉼표로 나눠서 뱃지로 만들기
      const roleBadges = post.roles
        ? post.roles.split(',').map(r => `<span class="badge">${r.trim()}</span>`).join('')
        : '';

      // 키워드를 쉼표로 나눠서 태그로 만들기
      const keywordTags = post.keywords
        ? post.keywords.split(',').map(k => `<span class="tag">${k.trim()}</span>`).join('')
        : '';

      // 팀 분위기를 쉼표로 나눠서 태그로 만들기
      const vibeTags = post.vibes
        ? post.vibes.split(',').map(v => `<span class="tag">${v.trim()}</span>`).join('')
        : '';

      // 카드 HTML 반환
      return `
        <div class="card">
          <div class="card-header">
            <span class="nickname">🔥 ${post.nickname}</span>
            <div class="role-badges">${roleBadges}</div>
          </div>
          <h2 class="project-name">${post.project_name}</h2>
          <p class="description">${post.description}</p>
          <div class="tag-group">
            ${keywordTags}
            ${vibeTags}
          </div>
          <div class="card-footer">
            <button class="contact-btn" onclick="alert('연락처: ${post.contact}')">연락하기 →</button>
          </div>
        </div>
      `;
    }
  </script>

</body>

</html>
